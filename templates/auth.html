{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 520px; margin: 0 auto;">
  <h2>{{ heading }}</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label>
      ユーザー名
      <input name="username" required placeholder="例: 山田太郎 / 田中花子">
      {% if mode == 'register' %}
      <div class="muted" style="font-weight:400; font-size:13px;">
        ※ ユーザー名はイベント参加時に表示されます。本名での登録を推奨します。
      </div>
      {% endif %}
    </label>
    <label>
      パスワード
      <input type="password" name="password" required>
    </label>
    <button class="btn" type="submit">{{ button_label }}</button>
  </form>
  <div class="actions">
    {% if mode == 'login' %}
      <a class="btn btn-secondary" href="{{ url_for('auth.register') }}">新規登録へ</a>
    {% else %}
      <a class="btn btn-secondary" href="{{ url_for('auth.login') }}">ログインへ</a>
    {% endif %}
  </div>
</div>
{% endblock %}
